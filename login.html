<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farmagitechs Premium</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle at 10% 20%, rgba(0, 149, 218, 0.15) 0%, rgba(0, 52, 122, 0.05) 90%),
                        linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* Dekorasi latar belakang lingkaran abstrak */
        .bg-circle {
            position: absolute;
            background: linear-gradient(135deg, #1a73e8, #00c6ff);
            border-radius: 50%;
            z-index: 1;
            filter: blur(80px);
            opacity: 0.2;
        }
        .circle-1 { width: 300px; height: 300px; top: -50px; right: -50px; }
        .circle-2 { width: 400px; height: 400px; bottom: -100px; left: -100px; }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0, 52, 122, 0.08), 
                        0 5px 15px rgba(0, 0, 0, 0.04);
            z-index: 2;
            transition: transform 0.3s ease;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .brand-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1a73e8, #0056b3);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 8px 16px rgba(26, 115, 232, 0.3);
        }
        .brand-header h2 {
            color: #1e293b;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .brand-header p {
            color: #64748b;
            font-size: 14px;
            margin-top: 6px;
        }
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        /* Icon styling inside input */
        .input-icon {
            position: absolute;
            left: 15px;
            fill: #94a3b8;
            width: 18px;
            height: 18px;
            transition: fill 0.3s ease;
        }
        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #0f172a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #f8fafc;
        }
        .form-group input:focus {
            border-color: #1a73e8;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.12);
            outline: none;
        }
        .form-group input:focus + .input-icon {
            fill: #1a73e8;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a73e8 0%, #0056b3 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.25);
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #1557b0 0%, #004085 100%);
            box-shadow: 0 6px 16px rgba(26, 115, 232, 0.35);
        }
        .btn-submit:active {
            transform: scale(0.99);
        }
        .btn-submit:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .alert {
            padding: 12px 16px;
            margin-bottom: 22px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .alert-success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .alert-danger { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-info { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
    </style>
</head>
<body>

<div class="bg-circle circle-1"></div>
<div class="bg-circle circle-2"></div>

<div class="login-container">
    <div class="brand-header">
        <div class="brand-logo">F</div>
        <h2>Farmagitechs</h2>
        <p>Aplikasi Manajemen Request Fitur</p>
    </div>

    <div id="alert-message" class="alert"></div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="username" required value="test-magang-sanden" placeholder="Masukkan username">
            </div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" id="password" required value="SMKBisa123!" placeholder="Masukkan password">
            </div>
        </div>
        <button type="submit" id="btnSubmit" class="btn-submit">Masuk ke Dashboard</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const usernameInput = document.getElementById('username').value;
        const passwordInput = document.getElementById('password').value;
        const alertBox = document.getElementById('alert-message');
        const btnSubmit = document.getElementById('btnSubmit');

        btnSubmit.disabled = true;
        alertBox.style.display = 'block';
        alertBox.className = 'alert alert-info';
        alertBox.innerText = 'Mengautentikasi akun Anda...';

        try {
            const response = await fetch("http://192.168.0.199:9006/api/keycloak_auth/login", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: usernameInput, password: passwordInput })
            });

            const result = await response.json();

            if (response.ok && result.data?.token?.access_token) {
                alertBox.className = 'alert alert-success';
                alertBox.innerText = result.message || 'Login sukses! Membuka gerbang aplikasi...';

                localStorage.setItem('access_token', result.data.token.access_token);

                setTimeout(() => {
                    window.location.href = 'list_request.html';
                }, 1300);
            } else {
                btnSubmit.disabled = false;
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = result.message || 'Kredensial tidak valid. Silakan coba kembali.';
            }
        } catch (error) {
            btnSubmit.disabled = false;
            alertBox.className = 'alert alert-danger';
            alertBox.innerText = 'Gagal terhubung. Pastikan jaringan komputer Anda berada di WiFi FG-Basement.';
        }
    });
</script>
</body>
</html>
